<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Colour Catcher - Jeu Educatif</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0D47A1 0%, #42A5F5 100%);
            min-height: 100vh;
            overflow: auto;
            user-select: none;
        }

        .screen {
            position: relative;
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            padding-top: 60px;
            animation: fadeIn 0.5s ease;
            overflow: auto;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .back-to-menu {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.95);
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: #0D47A1;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100;
            min-height: 48px;
            display: flex;
            align-items: center;
        }
        .back-to-menu:hover { transform: scale(1.05); background: #fff; }

        /* ===== WELCOME ===== */
        .welcome-title {
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 800;
            text-align: center;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .welcome-subtitle {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .welcome-emoji {
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 10px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .level-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 48px;
            border: 3px solid transparent;
        }

        .level-card:hover:not(.locked) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .level-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.5); }
        .level-card.completed { border-color: #FFD700; }
        .level-card-emoji { font-size: clamp(2rem, 6vw, 2.5rem); margin-bottom: 8px; }
        .level-card-title { font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 800; color: #0D47A1; margin-bottom: 4px; }
        .level-card-desc { font-size: clamp(0.8rem, 2.5vw, 0.9rem); color: #666; font-weight: 600; }
        .level-card-stars { margin-top: 8px; font-size: clamp(0.9rem, 2.5vw, 1rem); color: #FFD700; }
        .lock-icon { font-size: 1.5rem; margin-top: 5px; }

        .total-stars-display {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 10px 25px;
            color: #fff;
            font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 20px;
        }

        /* ===== GAME ===== */
        .game-header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 500px;
        }

        .game-title {
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px auto;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA000);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .round-info {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }

        .stars-count {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: #FFD700;
            font-weight: 700;
            margin-top: 5px;
        }

        /* ===== COMMAND BAR ===== */
        .command-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px 25px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 10px;
        }

        .command-en {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #fff;
        }

        .command-fr {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            font-style: italic;
            margin-top: 4px;
        }

        .catch-counter {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: #FFD700;
            font-weight: 700;
            margin-top: 6px;
        }

        /* ===== BALLOON FIELD ===== */
        .balloon-field {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: clamp(300px, 50vh, 450px);
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            margin-bottom: 15px;
        }

        .balloon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s ease;
            animation: floatBalloon 3s ease-in-out infinite;
        }

        .balloon:active { transform: scale(1.1) !important; }

        @keyframes floatBalloon {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-12px) translateX(5px); }
            50% { transform: translateY(-6px) translateX(-5px); }
            75% { transform: translateY(-15px) translateX(3px); }
        }

        .balloon-body {
            width: clamp(55px, 14vw, 80px);
            height: clamp(65px, 17vw, 95px);
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.15), 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .balloon-body::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 20%;
            height: 25%;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
        }

        .balloon-text {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .balloon-string {
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.5);
            margin-top: -2px;
        }

        /* ===== POP ANIMATION ===== */
        .balloon.popping .balloon-body {
            animation: popBurst 0.4s ease forwards;
        }

        .balloon.popping .balloon-string { display: none; }

        @keyframes popBurst {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .pop-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 0.6s ease-out forwards;
        }

        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        .balloon.wrong-pop {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===== FEEDBACK ===== */
        .feedback {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 800;
            text-align: center;
            margin: 10px 0;
            min-height: 40px;
            color: #fff;
        }

        .feedback.positive { color: #A5D6A7; }
        .feedback.info { color: #FFCC80; }

        /* ===== TIMER ===== */
        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px auto;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #FFC107, #F44336);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* ===== RESULT ===== */
        .result-container {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: clamp(20px, 5vw, 40px);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: popIn 0.4s ease;
        }

        .result-emoji { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 10px; }
        .result-title { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 800; color: #0D47A1; margin-bottom: 10px; }
        .result-text { font-size: clamp(1rem, 3vw, 1.2rem); color: #555; font-weight: 600; margin-bottom: 15px; }
        .result-stars-display { font-size: clamp(2rem, 8vw, 3rem); margin-bottom: 15px; }

        .action-btn {
            background: rgba(255,255,255,0.95);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: #0D47A1;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            min-height: 48px;
            margin: 5px;
        }

        .action-btn:hover { transform: translateY(-2px); }
        .action-btn.primary { background: linear-gradient(145deg, #FFD700, #FFA000); color: #fff; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 200;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-menu">&#8592; Mes Jeux</a>

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="screen active">
        <div class="welcome-emoji">&#127880;</div>
        <div class="welcome-title">Colour<br>Catcher</div>
        <div class="welcome-subtitle">Attrape les ballons en anglais !</div>
        <div class="total-stars-display" id="total-stars">&#11088; 0 etoile(s)</div>
        <div class="level-grid" id="level-grid"></div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="game-title" id="game-title"></div>
            <div class="round-info" id="round-info"></div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="timer-bar" id="timer-bar" style="display:none;"><div class="timer-fill" id="timer-fill"></div></div>
            <div class="stars-count" id="stars-count"></div>
        </div>
        <div class="command-bar" id="command-bar">
            <div class="command-en" id="command-en"></div>
            <div class="command-fr" id="command-fr"></div>
            <div class="catch-counter" id="catch-counter"></div>
        </div>
        <div class="balloon-field" id="balloon-field"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <div class="result-container">
            <div class="result-emoji" id="result-emoji"></div>
            <div class="result-title" id="result-title"></div>
            <div class="result-stars-display" id="result-stars"></div>
            <div class="result-text" id="result-text"></div>
            <div>
                <button class="action-btn primary" onclick="goMenu()">Menu &#127968;</button>
            </div>
        </div>
    </div>

    <script>
        // ===== AUDIO =====
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.value = 0.15;
                const now = audioCtx.currentTime;

                if (type === 'click') {
                    osc.frequency.value = 600;
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.value = 200;
                    gain.gain.value = 0.06;
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'win') {
                    osc.type = 'triangle';
                    [523, 659, 784, 1047].forEach((f, i) => {
                        osc.frequency.setValueAtTime(f, now + i * 0.15);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);
                }
            } catch(e) {}
        }

        // ===== TTS =====
        function speakEN(text) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-GB';
                u.rate = 0.8;
                u.volume = 1;
                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            } catch(e) {}
        }

        // ===== STATE =====
        let state = JSON.parse(localStorage.getItem('colourCatcher') || 'null') || {
            levelsCompleted: [false, false, false, false],
            levelStars: [0, 0, 0, 0],
            totalStars: 0
        };

        function saveState() {
            state.totalStars = state.levelStars.reduce((a, b) => a + b, 0);
            localStorage.setItem('colourCatcher', JSON.stringify(state));
            localStorage.setItem('colourCatcherScore', state.totalStars.toString());
        }

        // ===== DATA =====
        const COLOURS = [
            { en: 'red', fr: 'rouge', hex: '#F44336' },
            { en: 'blue', fr: 'bleu', hex: '#2196F3' },
            { en: 'yellow', fr: 'jaune', hex: '#FFEB3B' },
            { en: 'green', fr: 'vert', hex: '#4CAF50' },
            { en: 'orange', fr: 'orange', hex: '#FF9800' },
            { en: 'purple', fr: 'violet', hex: '#9C27B0' },
            { en: 'pink', fr: 'rose', hex: '#E91E63' }
        ];

        const NUMBERS_EN = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'];
        const NUMBERS_FR = ['', 'un', 'deux', 'trois', 'quatre', 'cinq', 'six', 'sept', 'huit', 'neuf', 'dix'];

        let currentLevel = 0;
        let currentRound = 0;
        let roundStars = 0;
        let roundTotal = 10;
        let isWaiting = false;
        let timerInterval = null;
        let catchNeeded = 0;
        let catchCount = 0;

        // ===== SCREENS =====
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderWelcome() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            document.getElementById('total-stars').innerHTML = `&#11088; ${state.totalStars} etoile(s)`;

            const levels = [
                { name: 'Touch the Colour', emoji: '&#127912;', desc: '10 rounds' },
                { name: 'Catch the Number', emoji: '&#128290;', desc: '10 rounds' },
                { name: 'Colour + Number', emoji: '&#127880;', desc: '10 rounds' },
                { name: 'Speed Round', emoji: '&#9889;', desc: '10 rounds' }
            ];

            levels.forEach((level, i) => {
                const card = document.createElement('div');
                card.className = 'level-card';
                const unlocked = i === 0 || state.levelsCompleted[i - 1];
                if (!unlocked) card.classList.add('locked');
                if (state.levelsCompleted[i]) card.classList.add('completed');

                card.innerHTML = `
                    <div class="level-card-emoji">${level.emoji}</div>
                    <div class="level-card-title">${level.name}</div>
                    <div class="level-card-desc">${level.desc}</div>
                    ${!unlocked ? '<div class="lock-icon">&#128274;</div>' : ''}
                    ${state.levelStars[i] > 0 ? `<div class="level-card-stars">${'&#11088;'.repeat(state.levelStars[i])}</div>` : ''}
                `;

                if (unlocked) {
                    card.onclick = () => { playSound('click'); startLevel(i); };
                }
                grid.appendChild(card);
            });
        }

        // ===== START LEVEL =====
        function startLevel(level) {
            currentLevel = level;
            currentRound = 0;
            roundStars = 0;
            roundTotal = 10;

            const titles = ['Touch the Colour', 'Catch the Number', 'Colour + Number', 'Speed Round'];
            document.getElementById('game-title').textContent = titles[level];
            document.getElementById('timer-bar').style.display = level === 3 ? 'block' : 'none';
            document.getElementById('catch-counter').textContent = '';

            showScreen('game-screen');
            nextRound();
        }

        function updateHeader() {
            document.getElementById('round-info').textContent = `Round ${currentRound + 1} / ${roundTotal}`;
            document.getElementById('progress-fill').style.width = `${((currentRound + 1) / roundTotal) * 100}%`;
            document.getElementById('stars-count').innerHTML = `&#11088; ${roundStars}`;
        }

        // ===== NEXT ROUND =====
        function nextRound() {
            if (currentRound >= roundTotal) {
                finishLevel();
                return;
            }
            isWaiting = false;
            updateHeader();
            document.getElementById('feedback').textContent = '';
            document.getElementById('catch-counter').textContent = '';

            if (currentLevel === 0) setupColourRound();
            else if (currentLevel === 1) setupNumberRound();
            else if (currentLevel === 2) setupComboRound();
            else if (currentLevel === 3) setupSpeedRound();
        }

        // ===== HELPERS =====
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function placeBalloons(balloons) {
            const field = document.getElementById('balloon-field');
            field.innerHTML = '';
            const fieldW = field.offsetWidth || 400;
            const fieldH = field.offsetHeight || 350;
            const bw = 80;
            const bh = 110;

            balloons.forEach((b, i) => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.animationDelay = (i * 0.3) + 's';

                const x = 10 + (i % 4) * ((fieldW - bw - 20) / Math.min(balloons.length, 4));
                const y = 10 + Math.floor(i / 4) * (fieldH / 2 - 20);
                balloon.style.left = Math.min(x, fieldW - bw - 10) + 'px';
                balloon.style.top = Math.min(y, fieldH - bh - 10) + 'px';

                balloon.innerHTML = `
                    <div class="balloon-body" style="background:${b.color}">
                        <span class="balloon-text">${b.label || ''}</span>
                    </div>
                    <div class="balloon-string"></div>
                `;

                balloon.dataset.colorEn = b.colorEn || '';
                balloon.dataset.number = b.number || '';
                balloon.dataset.idx = i;

                balloon.onclick = () => {
                    if (b.onClick) b.onClick(balloon, b);
                };

                field.appendChild(balloon);
            });
        }

        function popBalloon(el, color) {
            el.classList.add('popping');
            playSound('pop');

            // Particles
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'pop-particle';
                p.style.background = color;
                const angle = (i / 8) * Math.PI * 2;
                p.style.setProperty('--dx', Math.cos(angle) * 40 + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * 40 + 'px');
                p.style.left = '50%';
                p.style.top = '40%';
                el.appendChild(p);
            }

            setTimeout(() => el.remove(), 500);
        }

        // ===== LEVEL 1: TOUCH THE COLOUR =====
        function setupColourRound() {
            const targetColour = COLOURS[randomInt(0, COLOURS.length - 1)];
            const commandEn = `Touch the ${targetColour.en.toUpperCase()} balloon!`;
            const commandFr = `Touche le ballon ${targetColour.fr} !`;

            document.getElementById('command-en').textContent = commandEn;
            document.getElementById('command-fr').textContent = commandFr;

            speakEN(`Touch the ${targetColour.en} balloon`);

            // Create 5 balloons, at least one is the target
            const others = shuffle(COLOURS.filter(c => c.en !== targetColour.en)).slice(0, 4);
            const all = shuffle([targetColour, ...others]);

            const balloons = all.map(c => ({
                color: c.hex,
                colorEn: c.en,
                label: '',
                onClick: (el, b) => {
                    if (isWaiting) return;
                    if (b.colorEn === targetColour.en) {
                        isWaiting = true;
                        popBalloon(el, targetColour.hex);
                        document.getElementById('feedback').className = 'feedback positive';
                        document.getElementById('feedback').textContent = `Yes! ${capitalize(targetColour.en)}! (${capitalize(targetColour.fr)})`;
                        roundStars++;
                        playSound('correct');
                        setTimeout(() => { currentRound++; nextRound(); }, 1200);
                    } else {
                        el.classList.add('wrong-pop');
                        document.getElementById('feedback').className = 'feedback info';
                        document.getElementById('feedback').textContent = `That's ${c.en} (${c.fr})... Try again!`;
                        playSound('wrong');
                        setTimeout(() => el.classList.remove('wrong-pop'), 400);
                    }
                }
            }));

            placeBalloons(balloons);
        }

        // ===== LEVEL 2: CATCH THE NUMBER =====
        function setupNumberRound() {
            const targetNum = randomInt(1, 10);
            const commandEn = `Catch number ${NUMBERS_EN[targetNum].toUpperCase()}!`;
            const commandFr = `Attrape le numero ${NUMBERS_FR[targetNum]} !`;

            document.getElementById('command-en').textContent = commandEn;
            document.getElementById('command-fr').textContent = commandFr;

            speakEN(`Catch number ${NUMBERS_EN[targetNum]}`);

            // 6 balloons with different numbers
            const nums = [targetNum];
            while (nums.length < 6) {
                const n = randomInt(1, 10);
                if (!nums.includes(n)) nums.push(n);
            }
            const shuffled = shuffle(nums);
            const colorsShuffled = shuffle(COLOURS);

            const balloons = shuffled.map((n, i) => ({
                color: colorsShuffled[i % colorsShuffled.length].hex,
                number: n,
                label: n.toString(),
                onClick: (el, b) => {
                    if (isWaiting) return;
                    if (b.number === targetNum) {
                        isWaiting = true;
                        popBalloon(el, colorsShuffled[i % colorsShuffled.length].hex);
                        document.getElementById('feedback').className = 'feedback positive';
                        document.getElementById('feedback').textContent = `Yes! ${capitalize(NUMBERS_EN[targetNum])}! (${NUMBERS_FR[targetNum]})`;
                        roundStars++;
                        playSound('correct');
                        setTimeout(() => { currentRound++; nextRound(); }, 1200);
                    } else {
                        el.classList.add('wrong-pop');
                        document.getElementById('feedback').className = 'feedback info';
                        document.getElementById('feedback').textContent = `That's ${NUMBERS_EN[n]}... Try again!`;
                        playSound('wrong');
                        setTimeout(() => el.classList.remove('wrong-pop'), 400);
                    }
                }
            }));

            placeBalloons(balloons);
        }

        // ===== LEVEL 3: COLOUR + NUMBER =====
        function setupComboRound() {
            const targetColour = COLOURS[randomInt(0, COLOURS.length - 1)];
            catchNeeded = randomInt(2, 3);
            catchCount = 0;

            const commandEn = `Catch ${NUMBERS_EN[catchNeeded].toUpperCase()} ${targetColour.en} balloons!`;
            const commandFr = `Attrape ${NUMBERS_FR[catchNeeded]} ballons ${targetColour.fr} !`;

            document.getElementById('command-en').textContent = commandEn;
            document.getElementById('command-fr').textContent = commandFr;
            document.getElementById('catch-counter').textContent = `0 / ${catchNeeded}`;

            speakEN(`Catch ${NUMBERS_EN[catchNeeded]} ${targetColour.en} balloons`);

            // Create balloons: catchNeeded of target color + extras of other colors
            const targets = [];
            for (let i = 0; i < catchNeeded; i++) targets.push(targetColour);

            const others = shuffle(COLOURS.filter(c => c.en !== targetColour.en));
            const otherBalloons = [];
            for (let i = 0; i < 4; i++) otherBalloons.push(others[i % others.length]);

            const all = shuffle([...targets, ...otherBalloons]);

            const balloons = all.map((c, i) => ({
                color: c.hex,
                colorEn: c.en,
                label: '',
                onClick: (el, b) => {
                    if (isWaiting) return;
                    if (b.colorEn === targetColour.en) {
                        popBalloon(el, c.hex);
                        catchCount++;
                        document.getElementById('catch-counter').textContent = `${catchCount} / ${catchNeeded}`;
                        playSound('pop');

                        if (catchCount >= catchNeeded) {
                            isWaiting = true;
                            document.getElementById('feedback').className = 'feedback positive';
                            document.getElementById('feedback').textContent = `Well done!`;
                            roundStars++;
                            playSound('correct');
                            setTimeout(() => { currentRound++; nextRound(); }, 1200);
                        }
                    } else {
                        el.classList.add('wrong-pop');
                        document.getElementById('feedback').className = 'feedback info';
                        document.getElementById('feedback').textContent = `That's ${c.en}... Find the ${targetColour.en} ones!`;
                        playSound('wrong');
                        setTimeout(() => el.classList.remove('wrong-pop'), 400);
                    }
                }
            }));

            placeBalloons(balloons);
        }

        // ===== LEVEL 4: SPEED ROUND =====
        let speedTimer = 0;
        let speedMax = 8000;

        function setupSpeedRound() {
            if (timerInterval) clearInterval(timerInterval);

            const isColorRound = Math.random() > 0.5;

            if (isColorRound) {
                // Color task
                const targetColour = COLOURS[randomInt(0, COLOURS.length - 1)];
                const commandEn = `Quick! Touch ${targetColour.en.toUpperCase()}!`;
                const commandFr = `Vite ! Touche le ${targetColour.fr} !`;

                document.getElementById('command-en').textContent = commandEn;
                document.getElementById('command-fr').textContent = commandFr;
                speakEN(`Quick! Touch ${targetColour.en}`);

                const others = shuffle(COLOURS.filter(c => c.en !== targetColour.en)).slice(0, 4);
                const all = shuffle([targetColour, ...others]);

                const balloons = all.map(c => ({
                    color: c.hex,
                    colorEn: c.en,
                    label: '',
                    onClick: (el, b) => {
                        if (isWaiting) return;
                        if (b.colorEn === targetColour.en) {
                            isWaiting = true;
                            clearInterval(timerInterval);
                            popBalloon(el, targetColour.hex);
                            document.getElementById('feedback').className = 'feedback positive';
                            document.getElementById('feedback').textContent = 'Yes!';
                            roundStars++;
                            playSound('correct');
                            setTimeout(() => { currentRound++; nextRound(); }, 800);
                        } else {
                            el.classList.add('wrong-pop');
                            playSound('wrong');
                            setTimeout(() => el.classList.remove('wrong-pop'), 400);
                        }
                    }
                }));

                placeBalloons(balloons);
            } else {
                // Number task
                const targetNum = randomInt(1, 10);
                const commandEn = `Quick! Catch ${NUMBERS_EN[targetNum].toUpperCase()}!`;
                const commandFr = `Vite ! Attrape ${NUMBERS_FR[targetNum]} !`;

                document.getElementById('command-en').textContent = commandEn;
                document.getElementById('command-fr').textContent = commandFr;
                speakEN(`Quick! Catch ${NUMBERS_EN[targetNum]}`);

                const nums = [targetNum];
                while (nums.length < 5) {
                    const n = randomInt(1, 10);
                    if (!nums.includes(n)) nums.push(n);
                }
                const shuffled = shuffle(nums);
                const colorsS = shuffle(COLOURS);

                const balloons = shuffled.map((n, i) => ({
                    color: colorsS[i % colorsS.length].hex,
                    number: n,
                    label: n.toString(),
                    onClick: (el, b) => {
                        if (isWaiting) return;
                        if (b.number === targetNum) {
                            isWaiting = true;
                            clearInterval(timerInterval);
                            popBalloon(el, colorsS[i % colorsS.length].hex);
                            document.getElementById('feedback').className = 'feedback positive';
                            document.getElementById('feedback').textContent = 'Yes!';
                            roundStars++;
                            playSound('correct');
                            setTimeout(() => { currentRound++; nextRound(); }, 800);
                        } else {
                            el.classList.add('wrong-pop');
                            playSound('wrong');
                            setTimeout(() => el.classList.remove('wrong-pop'), 400);
                        }
                    }
                }));

                placeBalloons(balloons);
            }

            // Timer
            speedTimer = speedMax;
            const timerFill = document.getElementById('timer-fill');
            timerFill.style.width = '100%';

            timerInterval = setInterval(() => {
                speedTimer -= 100;
                timerFill.style.width = `${(speedTimer / speedMax) * 100}%`;
                if (speedTimer <= 0) {
                    clearInterval(timerInterval);
                    if (!isWaiting) {
                        isWaiting = true;
                        document.getElementById('feedback').className = 'feedback info';
                        document.getElementById('feedback').textContent = 'Time\'s up!';
                        playSound('wrong');
                        setTimeout(() => { currentRound++; nextRound(); }, 1000);
                    }
                }
            }, 100);
        }

        // ===== FINISH =====
        function finishLevel() {
            if (timerInterval) clearInterval(timerInterval);
            const prev = state.levelStars[currentLevel];
            if (roundStars > prev) state.levelStars[currentLevel] = roundStars;
            state.levelsCompleted[currentLevel] = true;
            saveState();

            const pct = Math.round((roundStars / roundTotal) * 100);
            let emoji, title, text;
            if (pct === 100) {
                emoji = '&#127775;'; title = 'PERFECT!'; text = 'All balloons caught!';
            } else if (pct >= 60) {
                emoji = '&#11088;'; title = 'Great job!'; text = `${roundStars} out of ${roundTotal} correct!`;
            } else {
                emoji = '&#128170;'; title = 'Keep trying!'; text = 'You\'ll do better next time!';
            }

            document.getElementById('result-emoji').innerHTML = emoji;
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-text').textContent = text;
            document.getElementById('result-stars').innerHTML = '&#11088;'.repeat(roundStars) + '&#9723;'.repeat(roundTotal - roundStars);

            showScreen('result-screen');
            if (pct >= 60) launchConfetti();
            playSound(pct === 100 ? 'win' : 'correct');
        }

        function goMenu() {
            playSound('click');
            renderWelcome();
            showScreen('welcome-screen');
        }

        // ===== UTILS =====
        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        function launchConfetti() {
            const colors = ['#FFD700', '#FF6B6B', '#4CAF50', '#2196F3', '#FF9800', '#E91E63'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.animationDuration = (2 + Math.random() * 2) + 's';
                    c.style.width = (6 + Math.random() * 8) + 'px';
                    c.style.height = (6 + Math.random() * 8) + 'px';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 50);
            }
        }

        // ===== INIT =====
        renderWelcome();
    </script>
</body>
</html>
