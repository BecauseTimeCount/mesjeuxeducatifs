<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calcul Aventure - Jeu Educatif</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #FFF9E6 0%, #FFE4B5 100%);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* === ECRANS === */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 15px;
            animation: fadeIn 0.4s ease;
            overflow: auto;
            position: relative;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* === ECRAN D'ACCUEIL === */
        .title {
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            color: #FF6B35;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }

        .title-emoji {
            font-size: clamp(2.5rem, 8vw, 4rem);
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* Boutons de mode */
        .mode-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .mode-btn {
            background: white;
            border: none;
            border-radius: 25px;
            padding: 25px 30px;
            min-width: 140px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1),
                        inset 0 -4px 0 rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .mode-btn:hover, .mode-btn:active {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .mode-btn:active {
            transform: translateY(0);
        }

        .mode-btn .icon {
            font-size: 3rem;
        }

        .mode-btn .label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }

        .mode-btn.addition { border-left: 5px solid #4CAF50; }
        .mode-btn.subtraction { border-left: 5px solid #FF9800; }
        .mode-btn.mixed { border-left: 5px solid #9C27B0; }

        .mode-btn .stars {
            font-size: 0.9rem;
            color: #FFB800;
        }

        /* Stats d'accueil */
        .home-stats {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .stat-box {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #FF6B35;
        }

        /* === ECRAN DE JEU === */
        .game-screen {
            padding: 15px;
            justify-content: flex-start;
            padding-top: 20px;
        }

        /* Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .home-btn {
            background: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-btn:hover, .home-btn:active {
            transform: scale(1.1);
        }

        .level-badge {
            background: linear-gradient(145deg, #9C27B0, #7B1FA2);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .score-badge {
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #FFB800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Zone de calcul */
        .calculation-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        /* Affichage des objets */
        .objects-display {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            min-height: 120px;
        }

        .object-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 180px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
        }

        .object-item {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            cursor: pointer;
            transition: all 0.2s ease;
            animation: gentleBounce 3s ease infinite;
        }

        .object-item:nth-child(odd) {
            animation-delay: 0.5s;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .object-item:hover, .object-item.touched {
            transform: scale(1.3);
            animation: none;
        }

        .object-item.counted {
            filter: brightness(1.2);
            transform: scale(1.2);
        }

        .object-item.flying {
            animation: flyAway 0.8s ease forwards;
        }

        @keyframes flyAway {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) scale(0.3) rotate(360deg);
                opacity: 0;
            }
        }

        .operator {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 900;
            margin: 0 10px;
        }

        .operator.plus {
            color: #4CAF50;
        }

        .operator.minus {
            color: #FF9800;
        }

        /* Affichage numérique (mode avancé) */
        .numeric-display {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 900;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .numeric-display .num {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .numeric-display .operator {
            font-size: clamp(2.5rem, 8vw, 4rem);
        }

        .question-mark {
            color: #9C27B0;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Compteur visuel */
        .count-display {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .count-number {
            font-size: 2rem;
            font-weight: 900;
            color: #FF6B35;
        }

        /* Zone des réponses */
        .answers-zone {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .answer-btn {
            min-width: 80px;
            min-height: 80px;
            width: clamp(80px, 20vw, 100px);
            height: clamp(80px, 20vw, 100px);
            border: none;
            border-radius: 25px;
            font-size: clamp(2rem, 7vw, 2.8rem);
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12),
                        inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        .answer-btn:hover {
            transform: translateY(-5px);
        }

        .answer-btn:active {
            transform: translateY(0);
        }

        .answer-btn.color-1 { background: #FFCDD2; color: #C62828; }
        .answer-btn.color-2 { background: #C8E6C9; color: #2E7D32; }
        .answer-btn.color-3 { background: #BBDEFB; color: #1565C0; }
        .answer-btn.color-4 { background: #E1BEE7; color: #7B1FA2; }

        .answer-btn.correct {
            background: #4CAF50 !important;
            color: white !important;
            animation: correctPop 0.5s ease;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .answer-btn.wrong {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        .answer-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Bouton aide */
        .help-btn {
            background: linear-gradient(145deg, #FFD54F, #FFC107);
            color: #5D4037;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,193,7,0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .help-btn:hover {
            transform: scale(1.05);
        }

        .help-btn.used {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Streak indicator */
        .streak-display {
            position: fixed;
            top: 80px;
            right: 20px;
            background: linear-gradient(145deg, #FF6B35, #FF8A50);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .streak-display.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* Messages */
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .feedback-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .feedback-box {
            background: white;
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .feedback-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .feedback-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .feedback-subtext {
            font-size: 1.2rem;
            color: #666;
        }

        /* Explication visuelle */
        .explanation-box {
            background: #FFF9E6;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 2rem;
        }

        /* === ECRAN DE VICTOIRE === */
        .victory-screen {
            background: linear-gradient(180deg, #FFE082 0%, #FFB74D 100%);
        }

        .victory-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .victory-stars {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: starSpin 2s ease infinite;
        }

        @keyframes starSpin {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        .victory-score {
            font-size: 2rem;
            color: white;
            margin-bottom: 30px;
        }

        .victory-btn {
            background: white;
            color: #FF9800;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 18px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin: 10px;
        }

        .victory-btn:hover {
            transform: scale(1.05);
        }

        /* Confettis */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 50;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            animation: confettiFall 3s ease forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .objects-display {
                gap: 10px;
            }

            .object-group {
                padding: 10px;
                gap: 5px;
            }

            .object-item {
                font-size: 2.2rem;
            }

            .streak-display {
                top: auto;
                bottom: 20px;
                right: 10px;
            }
        }

        @media (min-width: 768px) {
            .calculation-zone {
                max-width: 700px;
            }
        }

        /* Petit message flottant */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 60;
        }

        .toast-message.show {
            opacity: 1;
        }

        /* === GRILLE POUR GRANDS NOMBRES === */
        .object-group.grid-layout {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 280px;
            padding: 12px;
        }

        .object-group.grid-layout .object-item {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
        }

        /* === GROUPES DE MULTIPLICATION === */
        .groups-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .object-box {
            background: rgba(255,255,255,0.9);
            border: 3px dashed #9C27B0;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            max-width: 100px;
            min-width: 70px;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.2);
        }

        .object-box .object-item {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            animation: none;
        }

        .multiplication-hint {
            font-size: 1.3rem;
            color: #666;
            margin: 10px 0;
            text-align: center;
            font-weight: 600;
        }

        .multiplication-hint .operator {
            font-size: 1.5rem;
            margin: 0 8px;
        }

        /* === ASTUCES PÉDAGOGIQUES === */
        .tip-box {
            background: linear-gradient(145deg, #FFF9C4, #FFF176);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(255,193,7,0.3);
            animation: tipSlideIn 0.4s ease;
        }

        @keyframes tipSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tip-icon {
            font-size: 1.5rem;
        }

        .tip-text {
            font-size: 1rem;
            color: #5D4037;
            font-weight: 600;
        }

        /* === BOUTON MULTIPLICATION === */
        .mode-btn.multiplication {
            border-left: 5px solid #E91E63;
        }
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: #666;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 10;
        }
        .back-to-menu:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <!-- Écran d'accueil -->
    <div id="home-screen" class="screen active">
        <a href="mes-jeux-educatifs.html" class="back-to-menu">&#8592; Mes Jeux</a>
        <div class="title-emoji">🧮</div>
        <h1 class="title">Calcul Aventure</h1>
        <p class="subtitle">Apprends à compter en t'amusant !</p>

        <div class="mode-buttons">
            <button class="mode-btn addition" onclick="startGame('addition')">
                <span class="icon">➕</span>
                <span class="label">Additions</span>
                <span class="stars" id="addition-stars">⭐ 0</span>
            </button>
            <button class="mode-btn subtraction" onclick="startGame('subtraction')">
                <span class="icon">➖</span>
                <span class="label">Soustractions</span>
                <span class="stars" id="subtraction-stars">⭐ 0</span>
            </button>
            <button class="mode-btn mixed" onclick="startGame('mixed')">
                <span class="icon">🎯</span>
                <span class="label">Mixte</span>
                <span class="stars" id="mixed-stars">⭐ 0</span>
            </button>
            <button class="mode-btn multiplication" onclick="startGame('multiplication')">
                <span class="icon">✖️</span>
                <span class="label">Groupes</span>
                <span class="stars" id="multiplication-stars">⭐ 0</span>
            </button>
        </div>

        <div class="home-stats">
            <div class="stat-box">
                <div class="stat-label">Total Etoiles</div>
                <div class="stat-value" id="total-stars">0 ⭐</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Meilleur Score</div>
                <div class="stat-value" id="best-score">0</div>
            </div>
        </div>
    </div>

    <!-- Écran de jeu -->
    <div id="game-screen" class="screen game-screen">
        <div class="game-header">
            <button class="home-btn" onclick="goHome()">🏠</button>
            <div class="level-badge" id="level-badge">Palier 1</div>
            <div class="score-badge" id="score-badge">⭐ 0</div>
        </div>

        <div class="calculation-zone">
            <!-- Mode visuel -->
            <div class="objects-display" id="objects-display">
                <!-- Objets générés ici -->
            </div>

            <!-- Mode numérique -->
            <div class="numeric-display" id="numeric-display" style="display: none;">
                <span class="num" id="num1">3</span>
                <span class="operator plus" id="op-display">+</span>
                <span class="num" id="num2">2</span>
                <span class="operator">=</span>
                <span class="num question-mark">?</span>
            </div>

            <div class="count-display" id="count-display"></div>

            <!-- Astuce pédagogique -->
            <div class="tip-box" id="tip-box" style="display: none;">
                <span class="tip-icon">💡</span>
                <span class="tip-text" id="tip-text"></span>
            </div>

            <div class="answers-zone" id="answers-zone">
                <!-- Réponses générées ici -->
            </div>

            <button class="help-btn" id="help-btn" onclick="showHelp()" style="display: none;">
                💡 Voir les objets
            </button>
        </div>

        <div class="streak-display" id="streak-display">🔥 Série : 0</div>
    </div>

    <!-- Écran de victoire -->
    <div id="victory-screen" class="screen victory-screen">
        <div class="victory-stars">🌟⭐🌟</div>
        <h2 class="victory-title">Fantastique !</h2>
        <div class="victory-score" id="victory-score">Tu as gagné 10 étoiles !</div>
        <button class="victory-btn" onclick="continuePlaying()">Continuer 🚀</button>
        <button class="victory-btn" onclick="goHome()" style="background: #FFE082; color: #5D4037;">Accueil 🏠</button>
    </div>

    <!-- Overlay de feedback -->
    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-box">
            <div class="feedback-emoji" id="feedback-emoji">🎉</div>
            <div class="feedback-text" id="feedback-text">Bravo !</div>
            <div class="feedback-subtext" id="feedback-subtext"></div>
            <div class="explanation-box" id="explanation-box" style="display: none;"></div>
        </div>
    </div>

    <!-- Confettis -->
    <div class="confetti-container" id="confetti-container"></div>

    <!-- Toast message -->
    <div class="toast-message" id="toast-message"></div>

    <script>
        // === CONFIGURATION ===
        const OBJECTS = ['🍎', '🍊', '🌟', '🎈', '🍬', '🚗', '🐟', '🌸'];

        const LEVELS = {
            1: { name: 'Palier 1', maxSum: 5, num1Max: 3, num2Max: 2, visual: true },
            2: { name: 'Palier 2', maxSum: 10, num1Max: 6, num2Max: 4, visual: true },
            3: { name: 'Palier 3', maxStart: 6, maxRemove: 3, visual: true, subtraction: true },
            4: { name: 'Palier 4', maxStart: 10, maxRemove: 5, visual: true, subtraction: true },
            5: { name: 'Palier 5', maxSum: 10, visual: false, mixed: true },
            // Nouveaux paliers avancés
            6: { name: 'Palier 6', maxSum: 15, num1Max: 10, num2Max: 5, visual: true, gridLayout: true },
            7: { name: 'Palier 7', maxStart: 15, maxRemove: 7, visual: true, subtraction: true, gridLayout: true },
            8: { name: 'Palier 8', maxSum: 20, visual: false, mixed: true },
            // Paliers multiplication
            9: { name: 'Palier 9', multiplication: true, visual: true, groupsMin: 2, groupsMax: 3, itemsMin: 2, itemsMax: 3, showAsAddition: true },
            10: { name: 'Palier 10', multiplication: true, visual: true, tables: [2, 5], maxMultiplier: 5 },
            11: { name: 'Palier 11', multiplication: true, visual: false, tables: [2, 3, 4, 5], maxMultiplier: 5 }
        };

        // Astuces pédagogiques
        const TIPS = {
            addition: [
                "💡 Compte d'abord le plus grand groupe !",
                "💡 Tu peux utiliser tes doigts pour compter",
                "💡 Touche chaque objet pour ne pas en oublier"
            ],
            subtraction: [
                "💡 Combien reste-t-il après le départ ?",
                "💡 Cache les objets qui partent avec ta main"
            ],
            multiplication: [
                "💡 Compte combien dans chaque boîte",
                "💡 C'est comme additionner plusieurs fois !",
                "💡 3 × 2 = 2 + 2 + 2"
            ],
            bigNumbers: [
                "💡 Groupe les objets par 5 pour compter plus vite",
                "💡 10 + quelque chose = 1 puis le chiffre !"
            ]
        };

        // === ÉTAT DU JEU ===
        let gameState = {
            mode: 'addition',
            currentLevel: 1,
            score: 0,
            streak: 0,
            totalStars: 0,
            bestScore: 0,
            modeScores: { addition: 0, subtraction: 0, mixed: 0, multiplication: 0 },
            currentObject: '🍎',
            num1: 0,
            num2: 0,
            correctAnswer: 0,
            isSubtraction: false,
            isMultiplication: false,
            numGroups: 0, // Pour la multiplication : nombre de groupes
            itemsPerGroup: 0, // Pour la multiplication : objets par groupe
            wrongAttempts: 0,
            consecutiveWrongType: 0, // Pour les astuces : erreurs consécutives sur même type
            lastQuestionType: '', // Type de la dernière question
            questionsInSession: 0,
            helpUsed: false,
            countedObjects: 0
        };

        // === AUDIO ===
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioContext) return;

            const now = audioContext.currentTime;

            switch(type) {
                case 'pop':
                    playNote(800, now, 0.05, 0.3, 'sine');
                    break;
                case 'victory':
                    playNote(523, now, 0.15, 0.4);
                    playNote(659, now + 0.15, 0.15, 0.4);
                    playNote(784, now + 0.3, 0.3, 0.4);
                    break;
                case 'whoosh':
                    playWhoosh(now);
                    break;
                case 'error':
                    playNote(200, now, 0.3, 0.2, 'triangle');
                    break;
                case 'click':
                    playNote(600, now, 0.05, 0.2);
                    break;
                case 'levelup':
                    playNote(523, now, 0.1, 0.4);
                    playNote(659, now + 0.1, 0.1, 0.4);
                    playNote(784, now + 0.2, 0.1, 0.4);
                    playNote(1047, now + 0.3, 0.4, 0.5);
                    break;
                case 'streak':
                    playNote(880, now, 0.1, 0.3);
                    playNote(1100, now + 0.1, 0.15, 0.3);
                    break;
            }
        }

        function playNote(freq, start, duration, volume = 0.5, type = 'sine') {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, start);
            gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
            osc.start(start);
            osc.stop(start + duration);
        }

        function playWhoosh(start) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, start);
            osc.frequency.exponentialRampToValueAtTime(800, start + 0.3);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(500, start);
            filter.frequency.exponentialRampToValueAtTime(2000, start + 0.3);

            gain.gain.setValueAtTime(0.2, start);
            gain.gain.exponentialRampToValueAtTime(0.01, start + 0.4);

            osc.start(start);
            osc.stop(start + 0.4);
        }

        // === LOCALSTORAGE ===
        function saveGame() {
            const data = {
                totalStars: gameState.totalStars,
                bestScore: gameState.bestScore,
                modeScores: gameState.modeScores
            };
            localStorage.setItem('calculAventure', JSON.stringify(data));
            localStorage.setItem('calculScore', gameState.totalStars.toString());
        }

        function loadGame() {
            const saved = localStorage.getItem('calculAventure');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.totalStars = data.totalStars || 0;
                gameState.bestScore = data.bestScore || 0;
                gameState.modeScores = data.modeScores || { addition: 0, subtraction: 0, mixed: 0, multiplication: 0 };
                // S'assurer que multiplication existe
                if (!gameState.modeScores.multiplication) {
                    gameState.modeScores.multiplication = 0;
                }
            }
            updateHomeUI();
        }

        function updateHomeUI() {
            document.getElementById('total-stars').textContent = gameState.totalStars + ' ⭐';
            document.getElementById('best-score').textContent = gameState.bestScore;
            document.getElementById('addition-stars').textContent = '⭐ ' + gameState.modeScores.addition;
            document.getElementById('subtraction-stars').textContent = '⭐ ' + gameState.modeScores.subtraction;
            document.getElementById('mixed-stars').textContent = '⭐ ' + gameState.modeScores.mixed;
            document.getElementById('multiplication-stars').textContent = '⭐ ' + gameState.modeScores.multiplication;
        }

        // === NAVIGATION ===
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame(mode) {
            initAudio();
            playSound('click');

            gameState.mode = mode;
            gameState.score = 0;
            gameState.streak = 0;
            gameState.questionsInSession = 0;
            gameState.consecutiveWrongType = 0;
            gameState.lastQuestionType = '';
            gameState.currentObject = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];

            // Déterminer le niveau de départ selon le mode
            if (mode === 'addition') {
                gameState.currentLevel = 1;
            } else if (mode === 'subtraction') {
                gameState.currentLevel = 3;
            } else if (mode === 'multiplication') {
                gameState.currentLevel = 9;
            } else {
                gameState.currentLevel = 5;
            }

            // Cacher l'astuce au démarrage
            document.getElementById('tip-box').style.display = 'none';

            updateGameUI();
            showScreen('game-screen');
            generateQuestion();
        }

        function goHome() {
            playSound('click');
            showScreen('home-screen');
            updateHomeUI();
        }

        // === LOGIQUE DU JEU ===
        function generateQuestion() {
            gameState.wrongAttempts = 0;
            gameState.helpUsed = false;
            gameState.countedObjects = 0;
            gameState.isMultiplication = false;

            // Cacher l'astuce pour la nouvelle question
            document.getElementById('tip-box').style.display = 'none';

            const level = LEVELS[gameState.currentLevel];

            // Changer d'objet toutes les 10 questions
            if (gameState.questionsInSession % 10 === 0) {
                gameState.currentObject = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];
            }

            // Déterminer le type de question
            if (level.multiplication) {
                generateMultiplication(level);
            } else if (gameState.mode === 'mixed') {
                gameState.isSubtraction = Math.random() > 0.5;
                generateAdditionOrSubtraction(level);
            } else if (gameState.mode === 'subtraction' || level.subtraction) {
                gameState.isSubtraction = true;
                generateAdditionOrSubtraction(level);
            } else {
                gameState.isSubtraction = false;
                generateAdditionOrSubtraction(level);
            }

            gameState.questionsInSession++;
            updateQuestionUI();
        }

        function generateAdditionOrSubtraction(level) {
            // Générer les nombres pour addition ou soustraction
            if (gameState.isSubtraction) {
                const maxStart = level.maxStart || 10;
                const maxRemove = level.maxRemove || 5;
                gameState.num1 = Math.floor(Math.random() * (maxStart - 2)) + 3;
                gameState.num2 = Math.floor(Math.random() * Math.min(maxRemove, gameState.num1)) + 1;
                gameState.correctAnswer = gameState.num1 - gameState.num2;
                gameState.lastQuestionType = 'subtraction';
            } else {
                const maxSum = level.maxSum || 10;
                const num1Max = level.num1Max || 5;
                const num2Max = level.num2Max || 5;
                gameState.num1 = Math.floor(Math.random() * num1Max) + 1;
                const maxNum2 = Math.min(num2Max, maxSum - gameState.num1);
                gameState.num2 = Math.floor(Math.random() * maxNum2) + 1;
                gameState.correctAnswer = gameState.num1 + gameState.num2;
                gameState.lastQuestionType = level.gridLayout ? 'bigNumbers' : 'addition';
            }
        }

        function generateMultiplication(level) {
            gameState.isMultiplication = true;
            gameState.isSubtraction = false;
            gameState.lastQuestionType = 'multiplication';

            if (level.showAsAddition) {
                // Palier 9 : groupes simples, montré comme addition répétée
                const groupsMin = level.groupsMin || 2;
                const groupsMax = level.groupsMax || 3;
                const itemsMin = level.itemsMin || 2;
                const itemsMax = level.itemsMax || 3;

                gameState.numGroups = Math.floor(Math.random() * (groupsMax - groupsMin + 1)) + groupsMin;
                gameState.itemsPerGroup = Math.floor(Math.random() * (itemsMax - itemsMin + 1)) + itemsMin;
                gameState.num1 = gameState.numGroups;
                gameState.num2 = gameState.itemsPerGroup;
                gameState.correctAnswer = gameState.numGroups * gameState.itemsPerGroup;
            } else if (level.tables) {
                // Paliers 10-11 : tables de multiplication
                const table = level.tables[Math.floor(Math.random() * level.tables.length)];
                const maxMult = level.maxMultiplier || 5;
                const multiplier = Math.floor(Math.random() * maxMult) + 1;

                gameState.num1 = table;
                gameState.num2 = multiplier;
                gameState.numGroups = multiplier;
                gameState.itemsPerGroup = table;
                gameState.correctAnswer = table * multiplier;
            }
        }

        function updateQuestionUI() {
            const level = LEVELS[gameState.currentLevel];
            const objectsDisplay = document.getElementById('objects-display');
            const numericDisplay = document.getElementById('numeric-display');
            const helpBtn = document.getElementById('help-btn');
            const countDisplay = document.getElementById('count-display');

            countDisplay.innerHTML = '';

            if (gameState.isMultiplication && level.visual) {
                // Mode multiplication visuel
                objectsDisplay.style.display = 'block';
                numericDisplay.style.display = 'none';
                helpBtn.style.display = 'none';

                objectsDisplay.innerHTML = '';
                renderMultiplicationGroups(objectsDisplay, level);
            } else if (gameState.isMultiplication && !level.visual) {
                // Mode multiplication numérique (palier 11)
                objectsDisplay.style.display = 'none';
                numericDisplay.style.display = 'flex';
                helpBtn.style.display = 'block';
                helpBtn.classList.remove('used');

                document.getElementById('num1').textContent = gameState.num1;
                document.getElementById('num2').textContent = gameState.num2;
                const opDisplay = document.getElementById('op-display');
                opDisplay.textContent = '×';
                opDisplay.className = 'operator';
                opDisplay.style.color = '#E91E63';
            } else if (level.visual) {
                // Mode visuel addition/soustraction
                objectsDisplay.style.display = 'flex';
                numericDisplay.style.display = 'none';
                helpBtn.style.display = 'none';

                objectsDisplay.innerHTML = '';

                if (gameState.isSubtraction) {
                    // Soustraction : un seul groupe
                    const group = createObjectGroup(gameState.num1, true, level.gridLayout);
                    objectsDisplay.appendChild(group);
                } else {
                    // Addition : deux groupes
                    const group1 = createObjectGroup(gameState.num1, false, level.gridLayout);
                    const operator = document.createElement('span');
                    operator.className = 'operator plus';
                    operator.textContent = '+';
                    const group2 = createObjectGroup(gameState.num2, false, level.gridLayout);

                    objectsDisplay.appendChild(group1);
                    objectsDisplay.appendChild(operator);
                    objectsDisplay.appendChild(group2);
                }
            } else {
                // Mode numérique
                objectsDisplay.style.display = 'none';
                numericDisplay.style.display = 'flex';
                helpBtn.style.display = 'block';
                helpBtn.classList.remove('used');

                document.getElementById('num1').textContent = gameState.num1;
                document.getElementById('num2').textContent = gameState.num2;
                const opDisplay = document.getElementById('op-display');
                opDisplay.textContent = gameState.isSubtraction ? '−' : '+';
                opDisplay.className = 'operator ' + (gameState.isSubtraction ? 'minus' : 'plus');
            }

            // Générer les réponses
            generateAnswers();
        }

        function renderMultiplicationGroups(container, level) {
            // Conteneur pour les groupes
            const groupsContainer = document.createElement('div');
            groupsContainer.className = 'groups-container';

            // Créer chaque groupe (boîte)
            for (let g = 0; g < gameState.numGroups; g++) {
                const box = document.createElement('div');
                box.className = 'object-box';

                for (let i = 0; i < gameState.itemsPerGroup; i++) {
                    const obj = document.createElement('span');
                    obj.className = 'object-item';
                    obj.textContent = gameState.currentObject;
                    obj.onclick = () => handleObjectClick(obj);
                    box.appendChild(obj);
                }

                groupsContainer.appendChild(box);
            }

            container.appendChild(groupsContainer);

            // Ajouter l'indication textuelle
            const hint = document.createElement('div');
            hint.className = 'multiplication-hint';

            if (level.showAsAddition) {
                // Palier 9 : montrer comme addition répétée
                const additions = [];
                for (let i = 0; i < gameState.numGroups; i++) {
                    additions.push(gameState.itemsPerGroup);
                }
                hint.innerHTML = additions.join(' <span class="operator plus">+</span> ') + ' = <span class="question-mark">?</span>';
            } else {
                // Palier 10 : montrer avec le symbole ×
                hint.innerHTML = `${gameState.num1} <span class="operator" style="color: #E91E63">×</span> ${gameState.num2} = <span class="question-mark">?</span>`;
            }

            container.appendChild(hint);
        }

        function createObjectGroup(count, isSubtractionGroup, useGridLayout = false) {
            const group = document.createElement('div');
            group.className = 'object-group' + (useGridLayout ? ' grid-layout' : '');
            group.dataset.subtraction = isSubtractionGroup;

            for (let i = 0; i < count; i++) {
                const obj = document.createElement('span');
                obj.className = 'object-item';
                obj.textContent = gameState.currentObject;
                obj.dataset.index = i;

                // Marquer les objets à soustraire
                if (isSubtractionGroup && i >= (count - gameState.num2)) {
                    obj.dataset.toRemove = 'true';
                }

                obj.onclick = () => handleObjectClick(obj);
                group.appendChild(obj);
            }

            // Lancer l'animation de soustraction après un court délai
            if (isSubtractionGroup) {
                setTimeout(() => animateSubtraction(group), 800);
            }

            return group;
        }

        function handleObjectClick(obj) {
            if (obj.classList.contains('flying')) return;

            playSound('pop');
            obj.classList.add('touched');

            setTimeout(() => {
                obj.classList.remove('touched');
                obj.classList.add('counted');
            }, 150);

            gameState.countedObjects++;
            document.getElementById('count-display').innerHTML =
                `Comptés : <span class="count-number">${gameState.countedObjects}</span>`;
        }

        function animateSubtraction(group) {
            const toRemove = group.querySelectorAll('[data-to-remove="true"]');
            playSound('whoosh');

            toRemove.forEach((obj, i) => {
                setTimeout(() => {
                    obj.classList.add('flying');
                }, i * 150);
            });

            // Afficher un message après l'animation
            setTimeout(() => {
                showToast(`${gameState.num2} ${gameState.currentObject} s'envolent !`);
            }, toRemove.length * 150 + 300);
        }

        function generateAnswers() {
            const answersZone = document.getElementById('answers-zone');
            answersZone.innerHTML = '';

            const answers = [gameState.correctAnswer];
            const numAnswers = gameState.currentLevel >= 3 ? 4 : 3;

            while (answers.length < numAnswers) {
                let wrong;
                if (gameState.isMultiplication) {
                    // Pour multiplication : proposer des erreurs proches
                    const delta = Math.floor(Math.random() * 5) - 2; // -2 à +2
                    wrong = gameState.correctAnswer + delta;
                    if (wrong <= 0) wrong = gameState.correctAnswer + Math.abs(delta) + 1;
                } else if (gameState.isSubtraction) {
                    wrong = Math.floor(Math.random() * (gameState.num1 + 1));
                } else {
                    // Pour grands nombres, proposer des erreurs plus réalistes
                    const maxWrong = Math.max(12, gameState.correctAnswer + 5);
                    wrong = Math.floor(Math.random() * maxWrong) + 1;
                }
                if (!answers.includes(wrong) && wrong >= 0) {
                    answers.push(wrong);
                }
            }

            // Mélanger
            shuffleArray(answers);

            answers.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = `answer-btn color-${(i % 4) + 1}`;
                btn.textContent = ans;
                btn.onclick = () => checkAnswer(ans, btn);
                answersZone.appendChild(btn);
            });
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function checkAnswer(answer, btn) {
            if (answer === gameState.correctAnswer) {
                handleCorrect(btn);
            } else {
                handleWrong(btn);
            }
        }

        function handleCorrect(btn) {
            playSound('victory');
            btn.classList.add('correct');
            disableAllAnswers();

            gameState.score++;
            gameState.streak++;
            gameState.totalStars++;
            gameState.modeScores[gameState.mode]++;
            gameState.consecutiveWrongType = 0; // Reset compteur erreurs

            if (gameState.score > gameState.bestScore) {
                gameState.bestScore = gameState.score;
            }

            updateGameUI();
            saveGame();
            launchConfetti();

            // Bonus de série
            if (gameState.streak >= 5 && gameState.streak % 5 === 0) {
                playSound('streak');
                showStreakBonus();
            }

            // Messages d'encouragement
            const messages = ['Super !', 'Bravo !', 'Excellent !', 'Génial !', 'Parfait !'];
            const msg = messages[Math.floor(Math.random() * messages.length)];

            showFeedback('🎉', msg, '+1 étoile !');

            setTimeout(() => {
                hideFeedback();
                checkProgress();
            }, 1200);
        }

        function handleWrong(btn) {
            playSound('error');
            btn.classList.add('wrong');
            gameState.wrongAttempts++;
            gameState.streak = 0;
            updateStreakDisplay();

            // Tracker les erreurs consécutives pour les astuces
            gameState.consecutiveWrongType++;

            setTimeout(() => {
                btn.classList.remove('wrong');
                btn.classList.add('disabled');
            }, 500);

            if (gameState.wrongAttempts >= 2) {
                // Afficher une astuce si 2+ erreurs consécutives sur même type
                if (gameState.consecutiveWrongType >= 2) {
                    showTip();
                }
                // Montrer la bonne réponse
                showCorrectAnswer();
            } else {
                showToast('Essaie encore ! 💪');
            }
        }

        function showTip() {
            const tipBox = document.getElementById('tip-box');
            const tipText = document.getElementById('tip-text');

            // Sélectionner le type d'astuce approprié
            let tipCategory = gameState.lastQuestionType;
            if (!TIPS[tipCategory]) {
                tipCategory = 'addition'; // Fallback
            }

            const tips = TIPS[tipCategory];
            const randomTip = tips[Math.floor(Math.random() * tips.length)];

            tipText.textContent = randomTip;
            tipBox.style.display = 'flex';
        }

        function showCorrectAnswer() {
            disableAllAnswers();

            // Trouver et mettre en évidence la bonne réponse
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => {
                if (parseInt(btn.textContent) === gameState.correctAnswer) {
                    btn.classList.add('correct');
                }
            });

            // Créer l'explication visuelle
            let explanation = '';
            if (gameState.isMultiplication) {
                // Pour la multiplication : montrer les groupes
                const groupsText = [];
                for (let i = 0; i < gameState.numGroups; i++) {
                    groupsText.push(gameState.currentObject.repeat(gameState.itemsPerGroup));
                }
                explanation = groupsText.join(' + ') + ` = ${gameState.currentObject.repeat(gameState.correctAnswer)}`;
            } else if (gameState.isSubtraction) {
                explanation = `${gameState.currentObject.repeat(gameState.num1)} − ${gameState.currentObject.repeat(gameState.num2)} = ${gameState.currentObject.repeat(gameState.correctAnswer)}`;
            } else {
                explanation = `${gameState.currentObject.repeat(gameState.num1)} + ${gameState.currentObject.repeat(gameState.num2)} = ${gameState.currentObject.repeat(gameState.correctAnswer)}`;
            }

            showFeedback('🤔', `La réponse est ${gameState.correctAnswer}`, '', explanation);

            setTimeout(() => {
                hideFeedback();
                generateQuestion();
            }, 3000);
        }

        function disableAllAnswers() {
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.classList.add('disabled');
            });
        }

        function checkProgress() {
            // Victoire tous les 10 points
            if (gameState.score > 0 && gameState.score % 10 === 0) {
                showVictory();
                return;
            }

            // Progression de niveau selon le mode
            const progressionRules = {
                addition: [
                    { from: 1, to: 2, score: 8 },
                    { from: 2, to: 6, score: 15 },  // Vers grands nombres
                    { from: 6, to: null, score: null }
                ],
                subtraction: [
                    { from: 3, to: 4, score: 8 },
                    { from: 4, to: 7, score: 15 },  // Vers grandes soustractions
                    { from: 7, to: null, score: null }
                ],
                mixed: [
                    { from: 5, to: 8, score: 15 },  // Vers mode numérique avancé
                    { from: 8, to: null, score: null }
                ],
                multiplication: [
                    { from: 9, to: 10, score: 8 },   // Groupes → Tables ×2 ×5
                    { from: 10, to: 11, score: 15 }, // Tables ×2 ×5 → Toutes tables
                    { from: 11, to: null, score: null }
                ]
            };

            const rules = progressionRules[gameState.mode] || [];
            for (const rule of rules) {
                if (gameState.currentLevel === rule.from && rule.to && gameState.score >= rule.score) {
                    gameState.currentLevel = rule.to;
                    playSound('levelup');
                    showToast(`🎊 ${LEVELS[rule.to].name} débloqué !`);
                    updateGameUI();
                    break;
                }
            }

            generateQuestion();
        }

        function showVictory() {
            document.getElementById('victory-score').textContent =
                `Tu as gagné ${gameState.score} étoiles !`;
            showScreen('victory-screen');
            launchConfetti();
            launchConfetti();
            playSound('levelup');
        }

        function continuePlaying() {
            playSound('click');
            showScreen('game-screen');
            generateQuestion();
        }

        function showHelp() {
            if (gameState.helpUsed) return;

            gameState.helpUsed = true;
            document.getElementById('help-btn').classList.add('used');
            playSound('click');

            // Afficher les objets temporairement
            const objectsDisplay = document.getElementById('objects-display');
            objectsDisplay.style.display = 'block';
            objectsDisplay.innerHTML = '';

            const level = LEVELS[gameState.currentLevel];

            if (gameState.isMultiplication) {
                // Afficher les groupes de multiplication
                renderMultiplicationGroups(objectsDisplay, level);
            } else if (gameState.isSubtraction) {
                const group = createObjectGroup(gameState.num1, true, level.gridLayout);
                objectsDisplay.appendChild(group);
            } else {
                const group1 = createObjectGroup(gameState.num1, false, level.gridLayout);
                const operator = document.createElement('span');
                operator.className = 'operator plus';
                operator.textContent = '+';
                const group2 = createObjectGroup(gameState.num2, false, level.gridLayout);

                objectsDisplay.appendChild(group1);
                objectsDisplay.appendChild(operator);
                objectsDisplay.appendChild(group2);
            }

            // Cacher après quelques secondes
            setTimeout(() => {
                objectsDisplay.style.display = 'none';
            }, 5000);
        }

        // === UI UPDATES ===
        function updateGameUI() {
            document.getElementById('score-badge').textContent = '⭐ ' + gameState.score;
            document.getElementById('level-badge').textContent = LEVELS[gameState.currentLevel].name;
            updateStreakDisplay();
        }

        function updateStreakDisplay() {
            const streakEl = document.getElementById('streak-display');
            if (gameState.streak >= 3) {
                streakEl.textContent = '🔥 Série : ' + gameState.streak;
                streakEl.classList.add('show');
            } else {
                streakEl.classList.remove('show');
            }
        }

        function showStreakBonus() {
            const streakEl = document.getElementById('streak-display');
            streakEl.style.transform = 'scale(1.3)';
            setTimeout(() => {
                streakEl.style.transform = '';
            }, 300);
        }

        function showFeedback(emoji, text, subtext = '', explanation = '') {
            document.getElementById('feedback-emoji').textContent = emoji;
            document.getElementById('feedback-text').textContent = text;
            document.getElementById('feedback-subtext').textContent = subtext;

            const explBox = document.getElementById('explanation-box');
            if (explanation) {
                explBox.innerHTML = explanation;
                explBox.style.display = 'flex';
            } else {
                explBox.style.display = 'none';
            }

            document.getElementById('feedback-overlay').classList.add('show');
        }

        function hideFeedback() {
            document.getElementById('feedback-overlay').classList.remove('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function launchConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#FF6B35', '#4CAF50', '#FFD54F', '#9C27B0', '#2196F3', '#E91E63'];

            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    container.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 40);
            }
        }

        // === INITIALISATION ===
        document.addEventListener('DOMContentLoaded', () => {
            loadGame();

            document.addEventListener('click', () => initAudio(), { once: true });
            document.addEventListener('touchstart', () => initAudio(), { once: true });
        });
    </script>
</body>
</html>
