<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simon Says - JayJay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-top: #1B5E20;
  --bg-bottom: #66BB6A;
  --white: #FFFFFF;
  --card-bg: rgba(255,255,255,0.15);
  --card-bg-solid: rgba(255,255,255,0.95);
  --gold: #FFD600;
  --correct: #43A047;
  --wrong: #E53935;
  --accent: #FFEB3B;
  --shadow: rgba(0,0,0,0.2);
}

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
  color: var(--white);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: clamp(12px, 3vw, 24px);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: clamp(8px, 2vw, 16px);
}

.back-btn {
  background: var(--card-bg);
  border: none;
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(14px, 3.5vw, 18px);
  padding: 10px 16px;
  border-radius: 12px;
  cursor: pointer;
  min-height: 48px;
  min-width: 48px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
}
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,0.25); }

.score-display {
  background: var(--card-bg);
  padding: 8px 16px;
  border-radius: 12px;
  font-weight: 700;
  font-size: clamp(14px, 3.5vw, 18px);
  display: flex;
  align-items: center;
  gap: 6px;
}

.title {
  text-align: center;
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 800;
  text-shadow: 2px 2px 4px var(--shadow);
  margin-bottom: clamp(4px, 1vw, 8px);
}

.mascot {
  font-size: clamp(36px, 9vw, 56px);
  text-align: center;
  margin-bottom: clamp(4px, 1vw, 8px);
  filter: drop-shadow(2px 2px 4px var(--shadow));
}

/* Level select */
.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(10px, 2.5vw, 16px);
  flex: 1;
  align-content: center;
}

.level-card {
  background: var(--card-bg);
  border: 3px solid transparent;
  border-radius: 16px;
  padding: clamp(14px, 3vw, 24px);
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.level-card.unlocked { border-color: var(--accent); background: rgba(255,255,255,0.2); }
.level-card.unlocked:hover, .level-card.unlocked:active { transform: scale(1.04); background: rgba(255,255,255,0.3); }
.level-card.locked { opacity: 0.5; cursor: not-allowed; }
.level-card .icon { font-size: clamp(28px, 7vw, 44px); }
.level-card .label { font-weight: 700; font-size: clamp(13px, 3.2vw, 16px); }
.level-card .stars { font-size: clamp(16px, 4vw, 22px); margin-top: 4px; }

/* Game area */
.game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(8px, 2vw, 14px);
}

.instruction {
  text-align: center;
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 800;
  text-shadow: 1px 1px 3px var(--shadow);
  min-height: 2.5em;
  display: flex;
  align-items: center;
  justify-content: center;
}

.subtitle {
  text-align: center;
  font-size: clamp(14px, 3.5vw, 20px);
  font-weight: 600;
  opacity: 0.85;
  min-height: 1.6em;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 5px;
  transition: width 0.4s ease;
}

/* Options grid for level 1 */
.options-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(8px, 2vw, 12px);
  width: 100%;
  max-width: 400px;
}

.option-btn {
  background: var(--card-bg-solid);
  color: #1B5E20;
  border: 3px solid transparent;
  border-radius: 14px;
  padding: clamp(12px, 3vw, 18px);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(16px, 4vw, 22px);
  cursor: pointer;
  min-height: 48px;
  transition: all 0.2s;
}
.option-btn:hover, .option-btn:active { transform: scale(1.03); border-color: var(--gold); }
.option-btn.correct { background: #C8E6C9; border-color: var(--correct); }
.option-btn.wrong { background: #FFCDD2; border-color: var(--wrong); }

/* Character */
.character-container {
  position: relative;
  width: clamp(200px, 55vw, 300px);
  height: clamp(300px, 75vw, 440px);
  margin: 0 auto;
}

.char-zone {
  position: absolute;
  border: 3px dashed rgba(255,255,255,0.5);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: clamp(10px, 2.5vw, 14px);
  color: var(--white);
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  transition: all 0.25s;
  min-width: 48px;
  min-height: 48px;
  background: rgba(255,255,255,0.1);
}
.char-zone:hover, .char-zone:active { background: rgba(255,255,255,0.25); }
.char-zone.highlight { background: var(--gold); border-color: var(--gold); color: #1B5E20; text-shadow: none; animation: pulse-zone 0.6s ease infinite alternate; }
.char-zone.correct-zone { background: var(--correct); border-color: var(--correct); }
.char-zone.wrong-zone { background: var(--wrong); border-color: var(--wrong); }
.char-zone.song-active { background: var(--gold); border-color: #FFF; color: #1B5E20; text-shadow: none; animation: pulse-zone 0.4s ease infinite alternate; }

@keyframes pulse-zone { from { transform: scale(1); } to { transform: scale(1.08); } }

/* Character body drawn with divs */
.char-body {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.char-head-circle {
  position: absolute;
  width: 35%;
  height: 18%;
  top: 2%;
  left: 32.5%;
  background: #FFCC80;
  border-radius: 50%;
  border: 3px solid #E6A84F;
}

.char-torso {
  position: absolute;
  width: 30%;
  height: 25%;
  top: 20%;
  left: 35%;
  background: #42A5F5;
  border-radius: 10px;
  border: 3px solid #1E88E5;
}

.char-arm-left, .char-arm-right {
  position: absolute;
  width: 8%;
  height: 22%;
  top: 22%;
  background: #FFCC80;
  border-radius: 8px;
  border: 2px solid #E6A84F;
}
.char-arm-left { left: 18%; }
.char-arm-right { right: 18%; }

.char-leg-left, .char-leg-right {
  position: absolute;
  width: 10%;
  height: 28%;
  top: 45%;
  background: #5C6BC0;
  border-radius: 8px;
  border: 2px solid #3F51B5;
}
.char-leg-left { left: 33%; }
.char-leg-right { right: 33%; }

.char-foot-left, .char-foot-right {
  position: absolute;
  width: 14%;
  height: 8%;
  top: 73%;
  background: #795548;
  border-radius: 6px 6px 10px 10px;
  border: 2px solid #5D4037;
}
.char-foot-left { left: 28%; }
.char-foot-right { right: 28%; }

.char-eye-left, .char-eye-right {
  position: absolute;
  width: 5%;
  height: 3%;
  top: 7%;
  background: #333;
  border-radius: 50%;
}
.char-eye-left { left: 38%; }
.char-eye-right { right: 38%; }

.char-nose-dot {
  position: absolute;
  width: 4%;
  height: 3%;
  top: 11%;
  left: 48%;
  background: #E6A84F;
  border-radius: 50%;
}

.char-mouth-line {
  position: absolute;
  width: 10%;
  height: 2.5%;
  top: 15%;
  left: 45%;
  background: #E57373;
  border-radius: 0 0 8px 8px;
}

.char-ear-left, .char-ear-right {
  position: absolute;
  width: 5%;
  height: 5%;
  top: 7%;
  background: #FFCC80;
  border-radius: 50%;
  border: 2px solid #E6A84F;
}
.char-ear-left { left: 28%; }
.char-ear-right { right: 28%; }

/* Feedback overlay */
.feedback {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.feedback.show { opacity: 1; pointer-events: auto; }
.feedback-content {
  background: var(--card-bg-solid);
  color: #1B5E20;
  padding: clamp(24px, 6vw, 40px);
  border-radius: 20px;
  text-align: center;
  font-size: clamp(20px, 5vw, 30px);
  font-weight: 800;
  box-shadow: 0 8px 30px var(--shadow);
  max-width: 90%;
}

/* Level complete */
.complete-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 3vw, 20px);
  text-align: center;
}
.complete-screen .big-icon { font-size: clamp(48px, 14vw, 80px); }
.complete-screen .msg { font-size: clamp(20px, 5vw, 30px); font-weight: 800; }
.complete-screen .stars-earned { font-size: clamp(28px, 8vw, 48px); }

.btn-primary {
  background: var(--gold);
  color: #1B5E20;
  border: none;
  border-radius: 14px;
  padding: clamp(12px, 3vw, 18px) clamp(24px, 6vw, 40px);
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: clamp(16px, 4vw, 22px);
  cursor: pointer;
  min-height: 48px;
  transition: transform 0.2s;
}
.btn-primary:hover, .btn-primary:active { transform: scale(1.05); }

.song-info {
  text-align: center;
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 600;
  opacity: 0.85;
}

.timer-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.1s linear;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="back-btn" onclick="goBack()">&#8592; Mes Jeux</button>
    <div class="score-display">&#11088; <span id="totalScore">0</span></div>
  </div>

  <div class="mascot">&#129490;</div>
  <h1 class="title">Simon Says</h1>

  <!-- LEVEL SELECT -->
  <div id="levelSelect" class="level-grid"></div>

  <!-- GAME AREA -->
  <div id="gameArea" class="game-area hidden"></div>

  <!-- FEEDBACK OVERLAY -->
  <div class="feedback" id="feedback">
    <div class="feedback-content" id="feedbackContent"></div>
  </div>
</div>

<script>
// ===== DATA =====
const BODY_PARTS = [
  { en: 'head', fr: 'tete' },
  { en: 'shoulders', fr: 'epaules' },
  { en: 'knees', fr: 'genoux' },
  { en: 'toes', fr: 'orteils' },
  { en: 'eyes', fr: 'yeux' },
  { en: 'ears', fr: 'oreilles' },
  { en: 'mouth', fr: 'bouche' },
  { en: 'nose', fr: 'nez' },
  { en: 'hands', fr: 'mains' },
  { en: 'feet', fr: 'pieds' }
];

const LEVELS = [
  { id: 1, name: 'Apprends les mots', icon: '\uD83D\uDCD6', rounds: 10 },
  { id: 2, name: 'Touche la partie', icon: '\uD83D\uDC46', rounds: 10 },
  { id: 3, name: 'Simon Says', icon: '\uD83D\uDDE3\uFE0F', rounds: 12 },
  { id: 4, name: 'Head Shoulders...', icon: '\uD83C\uDFB5', rounds: 1 }
];

const SONG_SEQUENCE = [
  'head','shoulders','knees','toes','knees','toes',
  'eyes','ears','mouth','nose',
  'head','shoulders','knees','toes','knees','toes',
  'eyes','ears','mouth','nose'
];

const POSITIVE_FR = [
  'Super !', 'Bravo !', 'Genial !', 'Excellent !', 'Tres bien !', 'Fantastique !', 'Magnifique !'
];

// ===== STATE =====
let state = JSON.parse(localStorage.getItem('simonSays') || '{}');
if (!state.levels) {
  state.levels = {
    1: { unlocked: true, stars: 0 },
    2: { unlocked: false, stars: 0 },
    3: { unlocked: false, stars: 0 },
    4: { unlocked: false, stars: 0 }
  };
}
let totalScore = parseInt(localStorage.getItem('simonSaysScore') || '0');

let currentLevel = 0;
let currentRound = 0;
let roundScore = 0;
let roundErrors = 0;
let gameActive = false;
let noTapTimer = null;

// ===== AUDIO =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, dur, type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playCorrect() {
  playTone(523, 0.15);
  setTimeout(function() { playTone(659, 0.15); }, 100);
  setTimeout(function() { playTone(784, 0.2); }, 200);
}
function playWrong() { playTone(200, 0.3, 'triangle'); }
function playComplete() {
  [0,100,200,300,400].forEach(function(d, i) {
    setTimeout(function() { playTone(523 + i * 60, 0.2); }, d);
  });
}
function playStar() {
  playTone(880, 0.1);
  setTimeout(function() { playTone(1108, 0.15); }, 80);
}

function speak(text, lang, rate) {
  return new Promise(function(resolve) {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-GB';
    u.rate = rate || 0.8;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// ===== SAVE =====
function saveState() {
  localStorage.setItem('simonSays', JSON.stringify(state));
  localStorage.setItem('simonSaysScore', totalScore.toString());
  document.getElementById('totalScore').textContent = totalScore;
}

// ===== NAVIGATION =====
function goBack() { window.location.href = 'index.html'; }

function showLevelSelect() {
  document.getElementById('levelSelect').classList.remove('hidden');
  document.getElementById('gameArea').classList.add('hidden');
  gameActive = false;
  if (noTapTimer) { clearTimeout(noTapTimer); noTapTimer = null; }
  renderLevels();
}

function renderLevels() {
  var grid = document.getElementById('levelSelect');
  grid.innerHTML = '';
  LEVELS.forEach(function(lv) {
    var ls = state.levels[lv.id];
    var card = document.createElement('div');
    card.className = 'level-card ' + (ls.unlocked ? 'unlocked' : 'locked');
    var starFull = ls.stars > 0 ? '\u2B50'.repeat(ls.stars) : '';
    var starEmpty = '\u2606'.repeat(3 - ls.stars);
    card.innerHTML = '<div class="icon">' + lv.icon + '</div>' +
      '<div class="label">' + lv.name + '</div>' +
      '<div class="stars">' + starFull + starEmpty + '</div>';
    if (ls.unlocked) {
      (function(id) { card.onclick = function() { startLevel(id); }; })(lv.id);
    }
    grid.appendChild(card);
  });
}

// ===== FEEDBACK =====
function showFeedback(html, duration) {
  duration = duration || 1200;
  return new Promise(function(resolve) {
    var fb = document.getElementById('feedback');
    document.getElementById('feedbackContent').innerHTML = html;
    fb.classList.add('show');
    setTimeout(function() {
      fb.classList.remove('show');
      setTimeout(resolve, 200);
    }, duration);
  });
}

// ===== SHUFFLE =====
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function randomPositive() { return POSITIVE_FR[Math.floor(Math.random() * POSITIVE_FR.length)]; }

// ===== CHARACTER BUILDER =====
function buildCharacter(container, clickHandler, showLabels, highlightPart) {
  container.innerHTML = '';

  var body = document.createElement('div');
  body.className = 'char-body';
  body.innerHTML =
    '<div class="char-head-circle"></div>' +
    '<div class="char-eye-left"></div><div class="char-eye-right"></div>' +
    '<div class="char-ear-left"></div><div class="char-ear-right"></div>' +
    '<div class="char-nose-dot"></div><div class="char-mouth-line"></div>' +
    '<div class="char-torso"></div>' +
    '<div class="char-arm-left"></div><div class="char-arm-right"></div>' +
    '<div class="char-leg-left"></div><div class="char-leg-right"></div>' +
    '<div class="char-foot-left"></div><div class="char-foot-right"></div>';
  container.appendChild(body);

  var zones = {
    head:      { top: '0%',  left: '25%', width: '50%', height: '18%' },
    eyes:      { top: '5%',  left: '30%', width: '40%', height: '6%' },
    ears:      { top: '5%',  left: '10%', width: '18%', height: '8%', mirror: true },
    nose:      { top: '11%', left: '38%', width: '24%', height: '5%' },
    mouth:     { top: '15%', left: '35%', width: '30%', height: '5%' },
    shoulders: { top: '20%', left: '8%',  width: '84%', height: '10%' },
    hands:     { top: '32%', left: '5%',  width: '18%', height: '12%', mirror: true },
    knees:     { top: '55%', left: '22%', width: '56%', height: '12%' },
    toes:      { top: '82%', left: '18%', width: '64%', height: '12%' },
    feet:      { top: '75%', left: '18%', width: '64%', height: '14%' }
  };

  var zoneEls = {};

  Object.keys(zones).forEach(function(part) {
    var pos = zones[part];
    var el = document.createElement('div');
    el.className = 'char-zone';
    el.dataset.part = part;
    el.style.top = pos.top;
    el.style.left = pos.left;
    el.style.width = pos.width;
    el.style.height = pos.height;
    if (showLabels) el.textContent = part.toUpperCase();
    if (highlightPart === part) el.classList.add('highlight');
    if (clickHandler) {
      (function(p) { el.onclick = function() { clickHandler(p); }; })(part);
    }
    container.appendChild(el);
    zoneEls[part] = el;

    if (pos.mirror) {
      var el2 = document.createElement('div');
      el2.className = 'char-zone';
      el2.dataset.part = part;
      el2.style.top = pos.top;
      el2.style.right = pos.left;
      el2.style.width = pos.width;
      el2.style.height = pos.height;
      if (showLabels) el2.textContent = part.toUpperCase();
      if (highlightPart === part) el2.classList.add('highlight');
      if (clickHandler) {
        (function(p) { el2.onclick = function() { clickHandler(p); }; })(part);
      }
      container.appendChild(el2);
    }
  });

  return zoneEls;
}

// ===== START LEVEL =====
function startLevel(levelId) {
  getAudioCtx();
  currentLevel = levelId;
  currentRound = 0;
  roundScore = 0;
  roundErrors = 0;
  gameActive = true;

  document.getElementById('levelSelect').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');

  if (levelId === 1) startLevel1();
  else if (levelId === 2) startLevel2();
  else if (levelId === 3) startLevel3();
  else if (levelId === 4) startLevel4();
}

// ===== LEVEL 1: Learn the Words =====
function startLevel1() {
  var parts = shuffle(BODY_PARTS).slice(0, 10);
  currentRound = 0;
  roundScore = 0;
  roundErrors = 0;

  function nextRound() {
    if (currentRound >= 10) { finishLevel(1, roundScore, 10); return; }
    var target = parts[currentRound];
    var wrongPool = BODY_PARTS.filter(function(b) { return b.en !== target.en; });
    var wrongs = shuffle(wrongPool).slice(0, 2);
    var options = shuffle([target, wrongs[0], wrongs[1]]);

    var ga = document.getElementById('gameArea');
    ga.innerHTML =
      '<div class="progress-bar"><div class="progress-fill" style="width:' + (currentRound / 10 * 100) + '%"></div></div>' +
      '<div class="instruction">' + target.en.toUpperCase() + '</div>' +
      '<div class="subtitle">Quel est ce mot en francais ?</div>' +
      '<div class="character-container" id="charContainer"></div>' +
      '<div class="options-grid" id="optionsGrid"></div>';

    buildCharacter(document.getElementById('charContainer'), null, false, target.en);
    speak(target.en, 'en-GB', 0.8);

    var grid = document.getElementById('optionsGrid');
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.fr;
      (function(o) {
        btn.onclick = function() {
          if (!gameActive) return;
          gameActive = false;
          if (o.en === target.en) {
            this.classList.add('correct');
            playCorrect();
            roundScore++;
            totalScore += 10;
            saveState();
            showFeedback('\u2705 ' + randomPositive() + '<br>' + target.en + ' = ' + target.fr).then(function() {
              currentRound++;
              gameActive = true;
              nextRound();
            });
          } else {
            this.classList.add('wrong');
            playWrong();
            roundErrors++;
            var allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(function(b) { if (b.textContent === target.fr) b.classList.add('correct'); });
            showFeedback(target.en + ' = ' + target.fr, 1500).then(function() {
              currentRound++;
              gameActive = true;
              nextRound();
            });
          }
        };
      })(opt);
      grid.appendChild(btn);
    });
  }

  nextRound();
}

// ===== LEVEL 2: Touch the Part =====
function startLevel2() {
  var parts = shuffle(BODY_PARTS).slice(0, 10);
  currentRound = 0;
  roundScore = 0;
  roundErrors = 0;

  function nextRound() {
    if (currentRound >= 10) { finishLevel(2, roundScore, 10); return; }
    var target = parts[currentRound];

    var ga = document.getElementById('gameArea');
    ga.innerHTML =
      '<div class="progress-bar"><div class="progress-fill" style="width:' + (currentRound / 10 * 100) + '%"></div></div>' +
      '<div class="instruction">Touch your ' + target.en.toUpperCase() + '!</div>' +
      '<div class="subtitle">Touche : ' + target.fr + '</div>' +
      '<div class="character-container" id="charContainer"></div>';

    speak('Touch your ' + target.en, 'en-GB', 0.8);

    var answered = false;
    buildCharacter(document.getElementById('charContainer'), function(part) {
      if (answered || !gameActive) return;
      answered = true;

      var allZones = document.querySelectorAll('.char-zone');
      if (part === target.en) {
        allZones.forEach(function(z) { if (z.dataset.part === part) z.classList.add('correct-zone'); });
        playCorrect();
        roundScore++;
        totalScore += 10;
        saveState();
        showFeedback('\u2705 ' + randomPositive()).then(function() {
          currentRound++;
          nextRound();
        });
      } else {
        allZones.forEach(function(z) {
          if (z.dataset.part === part) z.classList.add('wrong-zone');
          if (z.dataset.part === target.en) z.classList.add('correct-zone');
        });
        playWrong();
        roundErrors++;
        showFeedback("C'etait : " + target.en.toUpperCase() + ' (' + target.fr + ')', 1500).then(function() {
          currentRound++;
          nextRound();
        });
      }
    }, true, null);
  }

  nextRound();
}

// ===== LEVEL 3: Simon Says =====
function startLevel3() {
  var allParts = shuffle(BODY_PARTS);
  currentRound = 0;
  roundScore = 0;
  roundErrors = 0;

  function nextRound() {
    if (currentRound >= 12) { finishLevel(3, roundScore, 12); return; }

    var isSimonSays = Math.random() < 0.6;
    var target = allParts[currentRound % allParts.length];

    var prefix = isSimonSays ? 'Simon says t' : 'T';
    var cmdText = prefix + 'ouch your ' + target.en.toUpperCase() + '!';
    var frSub = isSimonSays
      ? 'Jacques a dit : touche ton/ta ' + target.fr
      : 'Touche ton/ta ' + target.fr + ' (PIEGE !)';

    var ga = document.getElementById('gameArea');
    ga.innerHTML =
      '<div class="progress-bar"><div class="progress-fill" style="width:' + (currentRound / 12 * 100) + '%"></div></div>' +
      '<div class="instruction">' + cmdText + '</div>' +
      '<div class="subtitle">' + frSub + '</div>' +
      '<div class="character-container" id="charContainer"></div>' +
      '<div class="timer-bar" id="timerBar" style="display:' + (isSimonSays ? 'none' : 'block') + '"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>';

    var speakText = isSimonSays ? 'Simon says touch your ' + target.en : 'Touch your ' + target.en;
    speak(speakText, 'en-GB', 0.8);

    var answered = false;

    buildCharacter(document.getElementById('charContainer'), function(part) {
      if (answered) return;
      answered = true;
      if (noTapTimer) { clearTimeout(noTapTimer); noTapTimer = null; }

      var allZones = document.querySelectorAll('.char-zone');

      if (isSimonSays) {
        if (part === target.en) {
          allZones.forEach(function(z) { if (z.dataset.part === part) z.classList.add('correct-zone'); });
          playCorrect();
          roundScore++;
          totalScore += 10;
          saveState();
          showFeedback('\u2705 ' + randomPositive()).then(function() {
            currentRound++;
            nextRound();
          });
        } else {
          allZones.forEach(function(z) {
            if (z.dataset.part === part) z.classList.add('wrong-zone');
            if (z.dataset.part === target.en) z.classList.add('correct-zone');
          });
          playWrong();
          roundErrors++;
          showFeedback("C'etait : " + target.en.toUpperCase(), 1500).then(function() {
            currentRound++;
            nextRound();
          });
        }
      } else {
        playWrong();
        roundErrors++;
        showFeedback("Oups ! Simon n'a pas dit !<br>Il ne fallait pas toucher !", 1800).then(function() {
          currentRound++;
          nextRound();
        });
      }
    }, true, null);

    // Timer for no-tap rounds
    if (!isSimonSays) {
      var startTime = Date.now();
      var timerFill = document.getElementById('timerFill');

      var timerInterval = setInterval(function() {
        var elapsed = Date.now() - startTime;
        var pct = Math.max(0, 100 - (elapsed / 3000) * 100);
        if (timerFill) timerFill.style.width = pct + '%';
        if (elapsed >= 3000) clearInterval(timerInterval);
      }, 50);

      noTapTimer = setTimeout(function() {
        clearInterval(timerInterval);
        if (!answered) {
          answered = true;
          playCorrect();
          roundScore++;
          totalScore += 10;
          saveState();
          showFeedback("\u2705 " + randomPositive() + "<br>Tu n'as pas touche, bien joue !").then(function() {
            currentRound++;
            nextRound();
          });
        }
      }, 3000);
    }
  }

  nextRound();
}

// ===== LEVEL 4: Song Mode =====
function startLevel4() {
  currentRound = 0;
  roundScore = 0;
  roundErrors = 0;
  var songIndex = 0;
  var songActive = false;

  function renderSong() {
    var ga = document.getElementById('gameArea');
    ga.innerHTML =
      '<div class="progress-bar"><div class="progress-fill" id="songProgress" style="width:0%"></div></div>' +
      '<div class="instruction">\uD83C\uDFB5 Head, Shoulders, Knees and Toes!</div>' +
      '<div class="subtitle">Touche les parties du corps en rythme !</div>' +
      '<div class="character-container" id="charContainer"></div>' +
      '<div class="song-info" id="songInfo">Appuie sur le bouton pour commencer</div>' +
      '<button class="btn-primary" id="startSongBtn">\uD83C\uDFB5 C\'est parti !</button>';

    buildCharacter(document.getElementById('charContainer'), null, true, null);

    document.getElementById('startSongBtn').onclick = function() {
      this.classList.add('hidden');
      songActive = true;
      songIndex = 0;
      showFeedback('\uD83C\uDFB5 3... 2... 1... \uD83C\uDFB5', 1500).then(function() {
        nextNote();
      });
    };
  }

  function nextNote() {
    if (songIndex >= SONG_SEQUENCE.length) {
      songActive = false;
      finishLevel(4, roundScore, SONG_SEQUENCE.length);
      return;
    }

    var target = SONG_SEQUENCE[songIndex];
    var progressEl = document.getElementById('songProgress');
    if (progressEl) progressEl.style.width = (songIndex / SONG_SEQUENCE.length * 100) + '%';

    var info = document.getElementById('songInfo');
    if (info) info.textContent = target.toUpperCase() + ' ! (' + (songIndex + 1) + '/' + SONG_SEQUENCE.length + ')';

    var allZones = document.querySelectorAll('.char-zone');
    allZones.forEach(function(z) { z.classList.remove('song-active', 'correct-zone', 'wrong-zone'); });
    allZones.forEach(function(z) { if (z.dataset.part === target) z.classList.add('song-active'); });

    speak(target, 'en-GB', 1.0);

    var tapped = false;

    allZones.forEach(function(z) {
      z.onclick = function() {
        var part = this.dataset.part;
        if (tapped || !songActive) return;
        tapped = true;

        allZones.forEach(function(zz) { zz.onclick = null; zz.classList.remove('song-active'); });

        if (part === target) {
          playCorrect();
          roundScore++;
          totalScore += 5;
          saveState();
          allZones.forEach(function(zz) { if (zz.dataset.part === part) zz.classList.add('correct-zone'); });
        } else {
          playWrong();
          roundErrors++;
          allZones.forEach(function(zz) {
            if (zz.dataset.part === part) zz.classList.add('wrong-zone');
            if (zz.dataset.part === target) zz.classList.add('correct-zone');
          });
        }

        songIndex++;
        setTimeout(function() {
          allZones.forEach(function(zz) { zz.classList.remove('correct-zone', 'wrong-zone'); });
          nextNote();
        }, 600);
      };
    });

    // Auto-advance if no tap after 2.5s
    setTimeout(function() {
      if (!tapped && songActive) {
        tapped = true;
        roundErrors++;
        allZones.forEach(function(zz) {
          zz.onclick = null;
          zz.classList.remove('song-active');
          if (zz.dataset.part === target) zz.classList.add('wrong-zone');
        });
        songIndex++;
        setTimeout(function() {
          allZones.forEach(function(zz) { zz.classList.remove('wrong-zone'); });
          nextNote();
        }, 500);
      }
    }, 2500);
  }

  renderSong();
}

// ===== FINISH LEVEL =====
function finishLevel(levelId, score, total) {
  gameActive = false;
  if (noTapTimer) { clearTimeout(noTapTimer); noTapTimer = null; }
  playComplete();

  var pct = score / total;
  var stars = pct >= 0.9 ? 3 : pct >= 0.7 ? 2 : 1;

  var prevStars = state.levels[levelId].stars;
  if (stars > prevStars) state.levels[levelId].stars = stars;

  // Unlock next level only if score >= 60%
  var passed = pct >= 0.6;
  if (passed && levelId < 4 && !state.levels[levelId + 1].unlocked) {
    state.levels[levelId + 1].unlocked = true;
  }

  saveState();

  var starsHtml = '\u2B50'.repeat(stars) + '\u2606'.repeat(3 - stars);
  var feedbackMsg = passed ? randomPositive() : 'Continue a t\'entrainer, tu vas y arriver !';
  var feedbackIcon = passed ? '\uD83C\uDF89' : '\uD83D\uDCAA';
  var ga = document.getElementById('gameArea');
  ga.innerHTML =
    '<div class="complete-screen">' +
      '<div class="big-icon">' + feedbackIcon + '</div>' +
      '<div class="msg">' + feedbackMsg + '</div>' +
      '<div class="subtitle">' + score + ' / ' + total + ' reussi' + (score > 1 ? 's' : '') + '</div>' +
      '<div class="stars-earned">' + starsHtml + '</div>' +
      (stars > prevStars ? '<div class="subtitle">Nouveau record !</div>' : '') +
      '<button class="btn-primary" id="continueBtn">Continuer</button>' +
    '</div>';

  document.getElementById('continueBtn').onclick = showLevelSelect;

  for (var i = 0; i < stars; i++) {
    (function(idx) {
      setTimeout(function() { playStar(); }, 400 + idx * 300);
    })(i);
  }
}

// ===== INIT =====
saveState();
renderLevels();
</script>
